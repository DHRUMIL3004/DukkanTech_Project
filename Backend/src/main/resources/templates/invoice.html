<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 20px;
        }

        .invoice-box {
            max-width: 700px;
            margin: auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .store-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .invoice-title {
            text-align: center;
            flex: 1;
        }

        .invoice-title h2 {
            margin: 0;
            color: #4CAF50;
        }

        hr {
            margin: 15px 0;
            border: 1px solid #eee;
        }

        .customer-section {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .customer-section p {
            margin: 3px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        .table-header {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }

        .totals {
            margin-top: 20px;
            width: 100%;
        }

        .totals td {
            padding: 8px;
        }

        .label {
            text-align: right;
            font-weight: bold;
        }

        .value {
            text-align: right;
        }

        .grand-total {
            font-size: 18px;
            font-weight: bold;
            border-top: 2px solid #000;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #555;
        }


    </style>
</head>

<body>

<div class="invoice-box">

    <!-- HEADER -->
    <div class="header">

        <!-- LEFT -->
        <div>
            <div class="store-name">DukaanTech Store</div>
            <div style="font-size:13px; color:#555;">Smart Billing Solution</div>
            <div style="font-size:12px; color:#777; margin-top:5px;">
                Ahmedabad, Gujarat <br>
                GSTIN: 22ABCDE1234F1Z5
            </div>
        </div>

        <!-- CENTER -->
        <div class="invoice-title">
            <h2>INVOICE</h2>
        </div>

        <!-- RIGHT -->
        <div style="text-align:right; font-size:13px;">
            <p><b>Invoice #:</b> <span th:text="${orderId}"></span></p>
            <p><b>Date:</b> <span th:text="${date}"></span></p>
            <p><b>Payment:</b> <span th:text="${paymentMethod}"></span></p>
        </div>

    </div>

    <hr>

    <!-- CUSTOMER DETAILS -->
    <div style="margin-top:15px;">

        <!-- LEFT -->
        <div style="display:inline-block; width:48%; vertical-align:top;">
            <p style="margin:0; font-weight:bold;">Bill To</p>
            <p style="margin:2px 0;" th:text="${customerName}"></p>
            <p style="margin:2px 0;" th:text="${phone}"></p>
        </div>

        <!-- RIGHT -->
        <div style="display:inline-block; width:48%; vertical-align:top; text-align:right;">
            <p style="margin:0; font-weight:bold;">Status</p>
            <p style="margin:2px 0; color:green; font-weight:bold;">PAID</p>
        </div>

    </div>

    <!-- ITEMS TABLE -->
    <table>

        <!-- HEADER ROW (PDF SAFE) -->
        <tr class="table-header">
            <td>Item</td>
            <td>Qty</td>
            <td>Price (₹)</td>
            <td>Tax (₹)</td>
            <td>Total (₹)</td>
        </tr>

        <!-- DATA -->
        <tr th:each="item : ${items}">
            <td th:text="${item['name']}"></td>
            <td th:text="${item['quantity']}"></td>
            <td th:text="${item['price']}"></td>
            <td th:text="${item['tax']}"></td>
            <td th:text="${item['total']}"></td>
        </tr>

    </table>

    <!-- TOTALS -->
    <table class="totals">
        <tr>
            <td class="label">Subtotal:</td>
            <td class="value" th:text="${subTotal}"></td>
        </tr>
        <tr>
            <td class="label">Tax:</td>
            <td class="value" th:text="${totalTax}"></td>
        </tr>
        <tr class="grand-total">
            <td class="label">Grand Total:</td>
            <td class="value" th:text="${totalAmount}"></td>
        </tr>
    </table>

    <!-- FOOTER -->
    <div class="footer">
        Thank you for your purchase <br>
        Visit Again!
    </div>

</div>

</body>
</html>
