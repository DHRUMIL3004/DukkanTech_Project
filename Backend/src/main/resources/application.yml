spring:
  config:
    import: optional:application-secret.yml

  main:
    banner-mode: off
    web-application-type: servlet

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        debug: false
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            enable: false

server:
  address: 0.0.0.0
  port: ${PORT:8080}
  servlet:
    context-path: /api

payment:
  upi-max-transaction-inr: 100000

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: INFO
    org.apache.catalina: INFO
    org.apache.coyote: INFO
    org.eclipse.angus.mail: INFO
    jakarta.mail: INFO
    com.intech.dukaantech: INFO
    ACTIVITY_LOGGER: INFO
    AUDIT_LOGGER: INFO
    PAYMENT_LOGGER: INFO
    ERROR_LOGGER: WARN